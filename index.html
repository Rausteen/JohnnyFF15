<!DOCTYPE html>
<html lang="fr" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JohnnyFF15 - Squad Tracker LoL</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />

    <!-- Open Graph / Discord Preview -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="JohnnyFF15 - Squad Tracker LoL" />
    <meta property="og:description" content="Tracker LoL entre potes avec notifications Discord quand quelqu'un lance une game, suivi live et récap de fin de partie." />
    <meta property="og:image" content="/background_image/discord.jpg" />
    <meta name="theme-color" content="#ef4444" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              background: "#09090b", // Zinc-950
              foreground: "#fafafa", // Zinc-50
              card: "#18181b", // Zinc-900
              primary: {
                DEFAULT: "#ef4444", // Red-500
                glow: "#7f1d1d", // Red-900
              },
              accent: {
                DEFAULT: "#8b5cf6", // Violet-500
                glow: "#4c1d95", // Violet-900
              },
              gold: {
                DEFAULT: "#f59e0b", // Amber-500
                glow: "#78350f", // Amber-900
              }
            },
            animation: {
              'pulse-fast': 'pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'shake': 'shake 0.82s cubic-bezier(.36,.07,.19,.97) both',
              'float': 'float 6s ease-in-out infinite',
              'marquee': 'marquee 25s linear infinite',
            },
            keyframes: {
              shake: {
                '10%, 90%': { transform: 'translate3d(-1px, 0, 0)' },
                '20%, 80%': { transform: 'translate3d(2px, 0, 0)' },
                '30%, 50%, 70%': { transform: 'translate3d(-4px, 0, 0)' },
                '40%, 60%': { transform: 'translate3d(4px, 0, 0)' }
              },
              float: {
                '0%, 100%': { transform: 'translateY(0)' },
                '50%': { transform: 'translateY(-20px)' },
              },
              marquee: {
                '0%': { transform: 'translateX(0%)' },
                '100%': { transform: 'translateX(-100%)' },
              }
            }
          },
        },
      }
    </script>
    <style>
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #09090b; 
      }
      ::-webkit-scrollbar-thumb {
        background: #27272a; 
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #3f3f46; 
      }
      body {
        background-color: #000000;
        color: #fafafa;
      }
      .bg-grid {
        background-size: 40px 40px;
        background-image: linear-gradient(to right, rgba(255, 255, 255, 0.05) 1px, transparent 1px),
                          linear-gradient(to bottom, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
      }

      /* Animated flame border for profile avatars */
      .animated-border {
        position: relative;
        z-index: 1;
      }
      .animated-border::before,
      .animated-border::after {
        content: "";
        position: absolute;
        inset: -4px;
        border-radius: inherit;
        z-index: -1;
      }
      .animated-border::before {
        background: linear-gradient(45deg,
          #ff0000, #ff4500, #ff8c00, #ffd700,
          #ff8c00, #ff4500, #ff0000, #ff4500,
          #ff8c00, #ffd700, #ff8c00, #ff4500, #ff0000);
        background-size: 400% 400%;
        animation: flame-dance 3s ease-in-out infinite;
        filter: blur(3px);
        opacity: 0.9;
        will-change: background-position, transform;
      }
      .animated-border::after {
        background: radial-gradient(circle at 50% 100%,
          rgba(255, 200, 0, 0.9) 0%,
          rgba(255, 100, 0, 0.7) 30%,
          rgba(255, 0, 0, 0.5) 60%,
          transparent 80%);
        animation: flame-flicker 0.5s ease-in-out infinite alternate, flame-pulse 2s ease-in-out infinite;
        filter: blur(2px);
        opacity: 0.8;
        will-change: opacity, transform, filter;
      }
      @keyframes flame-dance {
        0%, 100% {
          background-position: 0% 50%;
          transform: scale(1) rotate(0deg);
        }
        25% {
          background-position: 50% 25%;
          transform: scale(1.02) rotate(1deg);
        }
        50% {
          background-position: 100% 50%;
          transform: scale(1.05) rotate(0deg);
        }
        75% {
          background-position: 50% 75%;
          transform: scale(1.02) rotate(-1deg);
        }
      }
      @keyframes flame-flicker {
        0% { opacity: 0.7; transform: scale(0.98); }
        100% { opacity: 0.9; transform: scale(1.02); }
      }
      @keyframes flame-pulse {
        0%, 100% { filter: blur(3px) brightness(1); }
        50% { filter: blur(4px) brightness(1.2); }
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react-router-dom": "https://esm.sh/react-router-dom@^7.13.0",
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
    "zustand/": "https://esm.sh/zustand@^5.0.10/",
    "zustand": "https://esm.sh/zustand@^5.0.10"
  }
}
</script>
</head>

    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
